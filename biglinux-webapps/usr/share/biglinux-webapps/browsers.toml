# BigLinux WebApps — browser definitions
# =========================================
# Source of truth for all browser support. Distro maintainers can edit this
# file to add, remove, or adjust browsers without recompiling.
#
# The runtime reads from:  /usr/share/biglinux-webapps/browsers.toml
# Falling back to the version embedded in the binary when that file is absent.
#
# FIELDS
# ------
# id              Stable ID stored in webapps.json (must not change after creation)
# display_name    Human-readable label shown in the manager UI
# native_paths    Binary paths checked for native install; first existing path wins
# wm_class_prefix WM_CLASS prefix set by Chromium-family browsers (empty for Gecko)
# desktop_pattern Substring matched against `xdg-settings get default-web-browser` output
# firefox_like    true = Gecko engine → different CLI launch flags in big-webapps-exec
# flatpak_app_id  Flatpak application ID (absent = no Flatpak detection for this browser)
# flatpak_id      browser_id assigned when detected via Flatpak (required if flatpak_app_id set)
#
# NOTE: big-webapps-exec (bash) mirrors flatpak_app_id / flatpak_id in its case statement.
# Keep both in sync when adding a new browser.

# ---------------------------------------------------------------------------
# Gecko / Firefox-family
# ---------------------------------------------------------------------------

[[browser]]
id             = "firefox"
display_name   = "Firefox"
native_paths   = ["/usr/bin/firefox"]
wm_class_prefix = ""
desktop_pattern = "firefox"
firefox_like   = true
flatpak_app_id = "org.mozilla.firefox"
flatpak_id     = "flatpak-firefox"

[[browser]]
id             = "firefox-developer-edition"
display_name   = "Firefox Developer Edition"
native_paths   = ["/usr/bin/firefox-developer-edition"]
wm_class_prefix = ""
desktop_pattern = "firefox-developer"
firefox_like   = true

[[browser]]
id             = "librewolf"
display_name   = "LibreWolf"
native_paths   = ["/usr/bin/librewolf"]
wm_class_prefix = ""
desktop_pattern = "librewolf"
firefox_like   = true
flatpak_app_id = "io.gitlab.librewolf-community"
flatpak_id     = "flatpak-librewolf"

# ---------------------------------------------------------------------------
# Google Chrome
# ---------------------------------------------------------------------------

[[browser]]
id             = "google-chrome-stable"
display_name   = "Google Chrome"
native_paths   = ["/usr/bin/google-chrome-stable"]
wm_class_prefix = "google-chrome"
desktop_pattern = "google-chrome-stable"
desktop_aliases = ["google-chrome"]
firefox_like   = false
flatpak_app_id = "com.google.Chrome"
flatpak_id     = "flatpak-google-chrome-stable"
legacy_flatpak_ids = ["flatpak-chrome"]

[[browser]]
id             = "google-chrome-beta"
display_name   = "Google Chrome Beta"
native_paths   = ["/usr/bin/google-chrome-beta"]
wm_class_prefix = "google-chrome"
desktop_pattern = "google-chrome-beta"
firefox_like   = false

[[browser]]
id             = "google-chrome-unstable"
display_name   = "Google Chrome Dev"
native_paths   = ["/usr/bin/google-chrome-unstable"]
wm_class_prefix = "google-chrome"
desktop_pattern = "google-chrome-unstable"
firefox_like   = false

